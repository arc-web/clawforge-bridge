services:
  bridge:
    build: .
    container_name: clawforge-bridge
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3200:3200"
    networks:
      - plane_default
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3200/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
networks:
  plane_default:
    external: true
